spring:
  application:
    name: AutoWash Backend
  
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=AutoWash;encrypt=true;trustServerCertificate=true
    username: sa
    password: 12345
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServer2012Dialect
        format_sql: true
    show-sql: false
  
  mvc:
    cors:
      allowed-origins: http://localhost:5173, http://localhost:3000
      allowed-methods: GET, POST, PUT, DELETE, OPTIONS
      allowed-headers: '*'
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: autowash-super-secret-key-for-demo-project-2026
  expiration: 86400000

logging:
  level:
    root: INFO
    com.autowash: DEBUG

