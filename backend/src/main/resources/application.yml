spring:
  application:
    name: AutoWash Backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/autowash?useSSL=false&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  
  mvc:
    cors:
      allowed-origins: http://localhost:5173, http://localhost:3000
      allowed-methods: GET, POST, PUT, DELETE, OPTIONS
      allowed-headers: '*'
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-secret-key-change-this-in-production
  expiration: 86400000

logging:
  level:
    root: INFO
    com.autowash: DEBUG
